<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>KYUM CRM — غير متصل</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:24px;background:#071b26;color:#eef7f6;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.card{width:min(460px,100%);padding:28px;border:1px solid rgba(255,255,255,.12);border-radius:28px;background:rgba(15,23,42,.74);box-shadow:0 28px 70px rgba(0,0,0,.34);text-align:center}.logo{width:82px;height:82px;border-radius:24px;margin:auto auto 18px}.card h1{margin:0 0 10px;font-size:1.35rem}.card p{margin:0 0 22px;color:#a9c1c5;line-height:1.8}.card button{width:100%;min-height:48px;border:0;border-radius:15px;background:#1f9d8a;color:#fff;font-weight:800;font-size:1rem}</style>
</head>
<body>
  <main class="card">
    <img class="logo" src="assets/images/apple-touch-icon.png" alt="KYUM CRM">
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>يمكن فتح واجهة التطبيق المحفوظة، لكن بيانات العملاء والمتابعات والتقارير المباشرة تتطلب الاتصال بالإنترنت.</p>
    <button type="button" onclick="location.reload()">إعادة المحاولة</button>
  </main>
</body>
</html>
